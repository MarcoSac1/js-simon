<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Simon</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <h1>numbers to find out</h1>
    <section id="container">
        
    </section>
    <div class="overlay" id="overlay"></div>
    
    <!-- Custom Prompt Modal -->
    <div class="modal-prompt" id="modalPrompt">
        <div class="modal-content">
            <h2>Insert the numbers you remember</h2>
            <input type="number" id="numberInput" placeholder="Enter number" autofocus />
            <p id="countText">Number 1 of 5</p>
            <button id="submitBtn">OK</button>
        </div>
    </div>
    
    <script type="text/javascript" src="./js/script.js"></script>
</body>
</html>
